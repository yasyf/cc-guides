name: Install cc-guides
description: >
  Download a cc-guides release binary onto PATH, checksum-verified. With
  version: latest (the default) resolve the newest release, retrying while a
  concurrent release finishes uploading its assets; with a pinned x.y.z install
  exactly that release. Requires curl and sha256sum (present on GitHub-hosted
  runners). Outputs the resolved version.

inputs:
  version:
    description: "cc-guides version to install: 'latest' or an exact 'x.y.z'."
    required: false
    default: latest

outputs:
  version:
    description: The resolved cc-guides version (no leading 'v').
    value: ${{ steps.install.outputs.version }}

runs:
  using: composite
  steps:
    - name: Install cc-guides
      id: install
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        os="$(uname -s | tr '[:upper:]' '[:lower:]')"
        arch="$(uname -m)"
        case "$arch" in x86_64|amd64) arch=amd64 ;; arm64|aarch64) arch=arm64 ;; esac
        asset="cc-guides_${os}_${arch}"
        bindir="$RUNNER_TEMP/cc-guides-bin"
        mkdir -p "$bindir"

        if [ "$INPUT_VERSION" = latest ]; then
          # Resolve + download in one retry loop: a concurrent release can expose
          # the new tag via releases/latest before its assets finish uploading
          # (404 on download). Re-resolving each attempt also follows a release
          # that lands mid-loop.
          tag=""
          for i in 1 2 3 4 5; do
            effective="$(curl -fsSLI -o /dev/null -w '%{url_effective}' \
              "https://github.com/yasyf/cc-guides/releases/latest")"
            tag="${effective##*/tag/}"
            case "$tag" in v[0-9]*) ;; *) echo "::error::could not resolve latest cc-guides release (got '$effective')"; exit 1 ;; esac
            base="https://github.com/yasyf/cc-guides/releases/download/$tag"
            if curl -fsSL --retry 3 -o "$bindir/cc-guides" "$base/$asset" \
               && curl -fsSL --retry 3 -o "$bindir/checksums.txt" "$base/checksums.txt"; then
              break
            fi
            if [ "$i" = 5 ]; then
              echo "::error::assets for $tag never became available"
              exit 1
            fi
            echo "assets for $tag not yet available ($i/5) — sleeping 30s"
            sleep 30
          done
        else
          tag="v${INPUT_VERSION#v}"
          base="https://github.com/yasyf/cc-guides/releases/download/$tag"
          echo "installing cc-guides ${tag#v} ($asset)" >&2
          curl -fsSL --retry 3 -o "$bindir/cc-guides" "$base/$asset"
          curl -fsSL --retry 3 -o "$bindir/checksums.txt" "$base/checksums.txt"
        fi

        expected="$(awk -v a="$asset" '$2 == a {print $1}' "$bindir/checksums.txt")"
        actual="$(sha256sum "$bindir/cc-guides" | awk '{print $1}')"
        if [ -z "$expected" ] || [ "$actual" != "$expected" ]; then
          echo "::error::checksum mismatch for $asset at $tag (expected '${expected:-<none>}', got '$actual')"
          exit 1
        fi
        chmod +x "$bindir/cc-guides"
        echo "$bindir" >> "$GITHUB_PATH"
        echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
