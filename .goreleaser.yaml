# goreleaser v2 — the zig-CGO cross-compile recipe (reference/go-ci-and-release.md).
# cc-guides links tree-sitter (cgo), so every target builds with CGO_ENABLED=1: linux
# cross-compiles with `zig cc` (static musl), darwin builds natively with clang on the
# macOS runner. The release runs on macos-latest and signs with codesign+notarytool
# (not quill — quill SIGKILLs arm64). Validate locally: goreleaser release --snapshot --clean
version: 2

project_name: cc-guides

before:
  hooks:
    - go mod tidy

builds:
  - id: cc-guides
    main: ./cmd/cc-guides
    binary: cc-guides
    # tree-sitter is cgo, so every target builds with CGO_ENABLED=1 and a C toolchain.
    # linux cross-compiles via `zig cc` (zig bundles a full cross C toolchain: static
    # musl Linux); darwin builds natively on the macOS runner with clang because zig
    # does not ship the macOS SDK.
    env:
      - CGO_ENABLED=1
      # A darwin cgo build otherwise inherits the RUNNER's OS as its LC_BUILD_VERSION
      # minos (e.g. minos 15 on a macOS-15 runner), so the shipped binary refuses to
      # launch on older macOS — a regression from the pre-cgo pure-Go binaries, which
      # floored at 12.0. clang/cgo honor MACOSX_DEPLOYMENT_TARGET directly to pin the
      # deployment floor (verified: otool -l shows minos 12.0); the linux targets ignore
      # it. darwin inherits this via the build env; the release smoke asserts minos 12.0.
      - MACOSX_DEPLOYMENT_TARGET=12.0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/yasyf/cc-guides/internal/version.Version={{ .Version }}
      - -X github.com/yasyf/cc-guides/internal/version.Commit={{ .Commit }}
      - -X github.com/yasyf/cc-guides/internal/version.Date={{ .CommitDate }}
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - "CC=zig cc -target x86_64-linux-musl"
          - "CXX=zig c++ -target x86_64-linux-musl"
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - "CC=zig cc -target aarch64-linux-musl"
          - "CXX=zig c++ -target aarch64-linux-musl"
      # darwin amd64/arm64 add the deployment floor to the cgo compile/link flags on top
      # of the build-level env (CGO_ENABLED=1, MACOSX_DEPLOYMENT_TARGET=12.0, native clang),
      # with no CC override. Go's build cache does NOT key on MACOSX_DEPLOYMENT_TARGET, so a
      # warm cache populated under a newer SDK can supply cgo objects compiled to a higher
      # effective minos while the final link still stamps 12.0 (observed: cached-object
      # warnings for 26.0, binary reporting 12.0). -mmacosx-version-min IS part of the cgo
      # build-cache key, so pinning it in CGO_CFLAGS/CGO_LDFLAGS forces a recompile when the
      # target changes and holds every cgo object at the 12.0 floor.
      - goos: darwin
        goarch: amd64
        env:
          - CGO_CFLAGS=-mmacosx-version-min=12.0
          - CGO_LDFLAGS=-mmacosx-version-min=12.0
      - goos: darwin
        goarch: arm64
        env:
          - CGO_CFLAGS=-mmacosx-version-min=12.0
          - CGO_LDFLAGS=-mmacosx-version-min=12.0
    mod_timestamp: "{{ .CommitTimestamp }}"
    # Developer ID sign + notarize the darwin binaries via codesign + notarytool
    # (quill SIGKILLs on arm64 — anchore/quill#566), using the shared script the
    # import-developer-id action drops on the runner ($MACOS_CODESIGN_SCRIPT). Guarded
    # so a local `goreleaser release --snapshot` (no signing env) is a clean no-op.
    hooks:
      post:
        - cmd: sh -c 'if [ -n "${MACOS_CODESIGN_SCRIPT:-}" ]; then bash "$MACOS_CODESIGN_SCRIPT" "$1" "$2"; fi' -- "{{ .Path }}" "{{ .Target }}"
          output: true

archives:
  # Bare per-arch binaries named cc-guides_<os>_<arch> — the Guides action
  # (action.yml) downloads these directly from the release and verifies them
  # against checksums.txt:
  #   https://github.com/yasyf/cc-guides/releases/download/v${VERSION}/cc-guides_${OS}_${ARCH}
  - id: binary
    ids:
      - cc-guides
    formats: [binary]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
  # A normal tar.gz archive for general use (and the Homebrew cask).
  - id: archive
    ids:
      - cc-guides
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

# Darwin signing/notarization is native codesign + notarytool via the build post-hook
# above (the import-developer-id action drops $MACOS_CODESIGN_SCRIPT on the macOS
# runner) — not goreleaser's quill signer, which SIGKILLs arm64 (anchore/quill#566).
# Both no-op when the MACOS_* secrets are unset, so a release without Apple creds still
# ships (unsigned). See reference/go-ci-and-release.md § native codesign.

checksum:
  name_template: checksums.txt

# Default distribution: a native Homebrew cask published by goreleaser itself to the
# shared tap (no render/publish step). A cask ships the prebuilt binary as-is. Switch to a
# formula (native `brews:`, or a rendered `.rb` via the render-formula action) only when you
# need `brew services`, a runtime `depends_on`, or conditional install — see
# reference/go-ci-and-release.md § Formula recipe.
homebrew_casks:
  - name: cc-guides
    # Use the tar.gz archive (not the bare binary) for the cask: two archives
    # cover each OS/Arch, so the cask must pick one.
    ids:
      - archive
    binaries:
      - cc-guides
    repository:
      owner: yasyf
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/yasyf/cc-guides
    description: Canonical agent guides as a shipped Go binary — render AGENTS.md, CLAUDE.md, and shell artifacts from embedded, versioned fragments
    # Strip the quarantine attribute so the (notarized, or unsigned) binary runs on first launch.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/cc-guides"]
          end

release:
  prerelease: auto
  # Idempotent re-runs: overwrite same-named assets instead of erroring (HTTP 422). The shared
  # release-go.yml retries `goreleaser release --clean` past flaky notarization, and a rare
  # mid-publish failure would otherwise 422 on the retry's asset re-upload.
  replace_existing_artifacts: true

changelog:
  use: github
