name: Re-render guides

# Fleet re-render: install latest cc-guides, `ci-render`, push. Deploy-key
# pushes can touch workflows and retrigger CI; token pushes neither. Push
# events run only the caller's check job — no loop.

on:
  workflow_call: {}

permissions:
  contents: write

jobs:
  re-render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ssh-key: ${{ secrets.CC_GUIDES_DEPLOY_KEY }}

      - name: Install latest cc-guides
        uses: yasyf/cc-guides/install@action-v1
        with:
          version: latest

      - name: Render, diff-gate, commit
        id: commit
        shell: bash
        run: cc-guides ci-render

      - name: Self-check (only when a commit was pushed)
        if: steps.commit.outputs.pushed == '1'
        shell: bash
        run: cc-guides check --diff
