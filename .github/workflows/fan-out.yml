name: Fan out re-render

# After every successful Release, dispatch cc-guides-render to every fleet repo
# (fleet.json, cc-guides itself included). workflow_run on Release SUCCESS is
# the only ordering that can't wedge — it fires after goreleaser uploaded all
# assets; the checksums.txt poll below is the belt. Per-repo failures are loud
# (non-204 = job failure) but one dead repo doesn't stop the rest.
#
# Needs the FLEET_DISPATCH_TOKEN secret: fine-grained PAT, Contents r/w, all
# owner repos. Dispatch is the primary propagation path; each repo's weekly
# schedule is only the belt (schedules decay on inactive repos).

on:
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fan-out:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Wait for release assets
        shell: bash
        run: |
          set -euo pipefail
          effective="$(curl -fsSLI -o /dev/null -w '%{url_effective}' \
            "https://github.com/yasyf/cc-guides/releases/latest")"
          tag="${effective##*/tag/}"
          case "$tag" in v[0-9]*) ;; *) echo "::error::could not resolve latest release (got '$effective')"; exit 1 ;; esac
          url="https://github.com/yasyf/cc-guides/releases/download/$tag/checksums.txt"
          for i in 1 2 3 4 5; do
            if curl -fsSLI -o /dev/null "$url"; then
              echo "assets ready at $tag"
              exit 0
            fi
            echo "checksums.txt not yet available ($i/5) — sleeping 30s"
            sleep 30
          done
          echo "::error::release assets never appeared at $url"
          exit 1

      - name: Dispatch cc-guides-render to the fleet
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.FLEET_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::FLEET_DISPATCH_TOKEN is not set — mint a fine-grained PAT (Contents r/w, all owner repos) and store it as an Actions secret."
            exit 1
          fi
          failed=0
          while IFS= read -r repo; do
            if gh api "repos/$repo/dispatches" -f event_type=cc-guides-render >/dev/null 2>&1; then
              echo "dispatched: $repo"
            else
              echo "::error::dispatch failed: $repo"
              failed=1
            fi
          done < <(jq -r '.[]' fleet.json)
          exit "$failed"
