name: Guides check
description: >
  Verify every cc-guides artifact is fresh. A repo with a tracked
  .claude/fragments/cc-guides.lock installs exactly the lock's cc-guides version
  and runs one check; an un-migrated repo falls back to installing the version each
  artifact's banner records (grouped, checksum-verified). Either way a new cc-guides
  release can never redden this check. Requires the repo to be checked out first
  (actions/checkout).

inputs:
  files:
    description: >
      Optional whitespace-separated list of check targets (layout dirs and/or
      *.src.* sources). Default: every tracked layout.toml dir and *.src.* source.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Check rendered guides
      shell: bash
      env:
        INPUT_FILES: ${{ inputs.files }}
      run: |
        set -euo pipefail

        os="$(uname -s | tr '[:upper:]' '[:lower:]')"
        arch="$(uname -m)"
        case "$arch" in x86_64|amd64) arch=amd64 ;; arm64|aarch64) arch=arm64 ;; esac
        bindir="$(mktemp -d)"

        # install_ccguides <version> — download + checksum-verify into $bindir,
        # printing the binary path on stdout (diagnostics go to stderr).
        install_ccguides() {
          version="$1"
          bin="$bindir/cc-guides-$version"
          if [ -x "$bin" ]; then echo "$bin"; return; fi
          tag="v$version"
          asset="cc-guides_${os}_${arch}"
          base="https://github.com/yasyf/cc-guides/releases/download/$tag"
          echo "installing cc-guides $version ($asset)" >&2
          curl -fsSL --retry 3 -o "$bin" "$base/$asset"
          curl -fsSL --retry 3 -o "$bindir/checksums-$version.txt" "$base/checksums.txt"
          expected="$(awk -v a="$asset" '$2 == a {print $1}' "$bindir/checksums-$version.txt")"
          actual="$(sha256sum "$bin" | awk '{print $1}')"
          if [ -z "$expected" ] || [ "$actual" != "$expected" ]; then
            echo "::error::checksum mismatch for $asset at $tag (expected '${expected:-<none>}', got '$actual')"
            exit 1
          fi
          chmod +x "$bin"
          echo "$bin"
        }

        lock=".claude/fragments/cc-guides.lock"
        if git ls-files --error-unmatch -- "$lock" >/dev/null 2>&1; then
          # --- lock-first path (migrated repo) -----------------------------------
          # The lock pins the render version and every source commit; the action
          # installs exactly that version and runs one check over all units.
          # Single awk over the file (exit after the first match) — never a pipe into
          # head, which SIGPIPEs the producer under pipefail.
          version="$(awk -F'"' '/^version = / {print $2; exit}' "$lock")"
          if [ -z "$version" ]; then
            echo "::error file=$lock::lock has no version — run 'cc-guides render' and commit."
            exit 1
          fi
          if [ "$version" = "dev" ]; then
            echo "::error file=$lock::lock records a dev build — re-render with a released cc-guides and commit."
            exit 1
          fi
          if grep -qE '^commit = "local"' "$lock"; then
            echo "::error file=$lock::lock records commit = \"local\" (a dev render off a local source) — re-render against the committed sources and commit."
            exit 1
          fi
          bin="$(install_ccguides "$version")"
          check_status=0
          if [ -n "${INPUT_FILES// /}" ]; then
            # shellcheck disable=SC2206
            units=($INPUT_FILES)
            "$bin" check --diff "${units[@]}" || check_status=$?
          else
            "$bin" check --diff || check_status=$?
          fi
          if [ "$check_status" -ne 0 ]; then
            echo "::error::stale rendered guides — run 'cc-guides render' locally and commit the sources, artifacts, and lock together."
            exit 1
          fi
          newest="$version"
        else
          # --- legacy banner-grouped path (un-migrated repo) ---------------------
          # Each unit is a check argument: a ".claude/fragments/<target>" layout dir
          # or an "X.src.{md,sh}" source. Their artifacts are on disk already.
          units=()
          if [ -n "${INPUT_FILES// /}" ]; then
            # shellcheck disable=SC2206
            units=($INPUT_FILES)
          else
            while IFS= read -r lt; do
              [ -n "$lt" ] && units+=("${lt%/layout.toml}")
            done < <(git ls-files -- '.claude/fragments/**/layout.toml')
            while IFS= read -r src; do
              [ -n "$src" ] && units+=("$src")
            done < <(git ls-files -- '*.src.md' '*.src.sh')
          fi
          if [ "${#units[@]}" -eq 0 ]; then
            echo "::error::no cc-guides artifacts found — this repo is not migrated to cc-guides." \
                 " Run 'cc-guides migrate' (see https://github.com/yasyf/cc-guides) or drop this action."
            exit 1
          fi

          # Map each unit to its artifact + banner version.
          # v3 unit ".claude/fragments/<target>" -> artifact "<target>".
          # v1 unit "X.src.<ext>"                -> artifact "X.<ext>".
          # Banner core: cc-guides <version> src=<src> [fragments=<f>] | GENERATED
          declare -A by_version=()
          for unit in "${units[@]}"; do
            case "$unit" in
              .claude/fragments/*) artifact="${unit#.claude/fragments/}" ;;
              *.src.*)             artifact="${unit%.src.*}.${unit##*.}" ;;
              *)
                echo "::error::'$unit' is neither a .claude/fragments layout dir nor a *.src.* source"
                exit 1
                ;;
            esac
            if [ ! -f "$artifact" ]; then
              echo "::error file=$unit::rendered artifact '$artifact' is missing — run 'cc-guides render' and commit."
              exit 1
            fi
            # Read the banner fields with a single awk over the artifact's first two
            # lines (banner on line 1, or line 2 after a shell shebang) — file input
            # plus exit, never a printf|sed|head pipe that SIGPIPEs under pipefail.
            version="$(awk 'NR<=2 && /cc-guides [^ ]+ src=[^ ]+.*\| GENERATED/ {s=$0; sub(/^.*cc-guides /,"",s); sub(/ .*/,"",s); print s; exit} NR>2{exit}' "$artifact")"
            fragments="$(awk 'NR<=2 && /cc-guides [^ ]+ src=[^ ]+ fragments=[^ ]+ \| GENERATED/ {s=$0; sub(/^.*fragments=/,"",s); sub(/ .*/,"",s); print s; exit} NR>2{exit}' "$artifact")"
            if [ -z "$version" ]; then
              echo "::error file=$artifact::no cc-guides banner or lock — run 'cc-guides render' and commit."
              exit 1
            fi
            if [ "$version" = "dev" ]; then
              echo "::error file=$artifact::banner records a dev build — re-render with a released cc-guides and commit."
              exit 1
            fi
            if [ "$fragments" = "local" ]; then
              echo "::error file=$artifact::banner records 'fragments=local' (a dev render off a local source) — re-render against the committed layout and commit."
              exit 1
            fi
            by_version["$version"]+="$unit"$'\n'
          done

          # Install each banner version and check its group.
          failed=0
          for version in "${!by_version[@]}"; do
            bin="$(install_ccguides "$version")"
            mapfile -t group <<< "${by_version[$version]%$'\n'}"
            if ! "$bin" check --diff "${group[@]}"; then
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            echo "::error::stale rendered guides — run 'cc-guides render' locally and commit the layout + artifact together."
            exit 1
          fi
          newest="$(printf '%s\n' "${!by_version[@]}" | sort -V | tail -n 1)"
        fi

        # --- non-blocking freshness notice --------------------------------------
        # A newer cc-guides binary no longer forces a fleet refresh: content lives
        # in cc-skills, and a code-only release re-renders byte-identically (markers
        # are version-free), so the re-render loop skips it. This only flags a very
        # old binary.
        latest="$(curl -fsSLI -o /dev/null -w '%{url_effective}' \
          "https://github.com/yasyf/cc-guides/releases/latest" || true)"
        latest="${latest##*/tag/v}"
        if [ -n "$latest" ]; then
          if [ "$newest" != "$latest" ] && [ "$(printf '%s\n%s\n' "$newest" "$latest" | sort -V | tail -n 1)" = "$latest" ]; then
            echo "::notice::guides rendered with cc-guides $newest; latest is $latest — non-blocking (the fleet re-render refreshes on content changes, not binary releases)."
            {
              echo "### cc-guides freshness"
              echo "Rendered with **$newest**, latest release is **$latest**. Non-blocking."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
        fi
