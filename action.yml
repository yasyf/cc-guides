name: Guides check
description: >
  Verify every cc-guides artifact is fresh — both v3 .claude/fragments/<target>/
  layout dirs and transitional *.src.md / *.src.sh sources. Installs the exact
  cc-guides version each artifact's banner records (grouped, checksum-verified), so
  a new cc-guides release can never redden this check. Requires the repo to be
  checked out first (actions/checkout).

inputs:
  files:
    description: >
      Optional whitespace-separated list of check targets (layout dirs and/or
      *.src.* sources). Default: every tracked layout.toml dir and *.src.* source.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Check rendered guides
      shell: bash
      env:
        INPUT_FILES: ${{ inputs.files }}
      run: |
        set -euo pipefail

        # --- enumerate units (dual: v3 layout dirs + v1 sources) ---------------
        # Each unit is a check argument: a ".claude/fragments/<target>" layout dir
        # or an "X.src.{md,sh}" source. Their artifacts are on disk already.
        units=()
        if [ -n "${INPUT_FILES// /}" ]; then
          # shellcheck disable=SC2206
          units=($INPUT_FILES)
        else
          while IFS= read -r lt; do
            [ -n "$lt" ] && units+=("${lt%/layout.toml}")
          done < <(git ls-files -- '.claude/fragments/**/layout.toml')
          while IFS= read -r src; do
            [ -n "$src" ] && units+=("$src")
          done < <(git ls-files -- '*.src.md' '*.src.sh')
        fi
        if [ "${#units[@]}" -eq 0 ]; then
          echo "::error::no cc-guides artifacts found — this repo is not migrated to cc-guides." \
               " Run 'cc-guides migrate' (see https://github.com/yasyf/cc-guides) or drop this action."
          exit 1
        fi

        # --- map each unit to its artifact + banner version --------------------
        # v3 unit ".claude/fragments/<target>" -> artifact "<target>".
        # v1 unit "X.src.<ext>"                -> artifact "X.<ext>".
        # Banner core: cc-guides <version> src=<src> [fragments=<f>] | GENERATED
        declare -A by_version=()
        for unit in "${units[@]}"; do
          case "$unit" in
            .claude/fragments/*) artifact="${unit#.claude/fragments/}" ;;
            *.src.*)             artifact="${unit%.src.*}.${unit##*.}" ;;
            *)
              echo "::error::'$unit' is neither a .claude/fragments layout dir nor a *.src.* source"
              exit 1
              ;;
          esac
          if [ ! -f "$artifact" ]; then
            echo "::error file=$unit::rendered artifact '$artifact' is missing — run 'cc-guides render' and commit."
            exit 1
          fi
          banner="$(head -n 2 "$artifact")"
          version="$(printf '%s\n' "$banner" \
            | sed -nE 's/.*cc-guides ([^ ]+) src=[^ ]+.*\| GENERATED.*/\1/p' | head -n 1)"
          fragments="$(printf '%s\n' "$banner" \
            | sed -nE 's/.*cc-guides [^ ]+ src=[^ ]+ fragments=([^ ]+) \| GENERATED.*/\1/p' | head -n 1)"
          if [ -z "$version" ]; then
            echo "::error file=$artifact::no cc-guides banner in the first two lines — run 'cc-guides render' and commit."
            exit 1
          fi
          if [ "$version" = "dev" ]; then
            echo "::error file=$artifact::banner records a dev build — re-render with a released cc-guides and commit."
            exit 1
          fi
          if [ "$fragments" = "local" ]; then
            echo "::error file=$artifact::banner records 'fragments=local' (a dev render off a local source) — re-render against the committed layout and commit."
            exit 1
          fi
          by_version["$version"]+="$unit"$'\n'
        done

        # --- install each banner version and check its group -------------------
        os="$(uname -s | tr '[:upper:]' '[:lower:]')"
        arch="$(uname -m)"
        case "$arch" in x86_64|amd64) arch=amd64 ;; arm64|aarch64) arch=arm64 ;; esac
        bindir="$(mktemp -d)"
        failed=0
        for version in "${!by_version[@]}"; do
          tag="v$version"
          asset="cc-guides_${os}_${arch}"
          base="https://github.com/yasyf/cc-guides/releases/download/$tag"
          echo "installing cc-guides $version ($asset)"
          curl -fsSL --retry 3 -o "$bindir/cc-guides-$version" "$base/$asset"
          curl -fsSL --retry 3 -o "$bindir/checksums-$version.txt" "$base/checksums.txt"
          expected="$(awk -v a="$asset" '$2 == a {print $1}' "$bindir/checksums-$version.txt")"
          actual="$(sha256sum "$bindir/cc-guides-$version" | awk '{print $1}')"
          if [ -z "$expected" ] || [ "$actual" != "$expected" ]; then
            echo "::error::checksum mismatch for $asset at $tag (expected '${expected:-<none>}', got '$actual')"
            exit 1
          fi
          chmod +x "$bindir/cc-guides-$version"
          mapfile -t group <<< "${by_version[$version]%$'\n'}"
          if ! "$bindir/cc-guides-$version" check --diff "${group[@]}"; then
            failed=1
          fi
        done
        if [ "$failed" -ne 0 ]; then
          echo "::error::stale rendered guides — run 'cc-guides render' locally and commit the layout + artifact together."
          exit 1
        fi

        # --- non-blocking freshness notice --------------------------------------
        # A newer cc-guides binary no longer forces a fleet refresh: content lives
        # in cc-skills, and a code-only release re-renders to a banner-only diff
        # that the re-render loop skips. This notice only flags a very old binary.
        latest="$(curl -fsSLI -o /dev/null -w '%{url_effective}' \
          "https://github.com/yasyf/cc-guides/releases/latest" || true)"
        latest="${latest##*/tag/v}"
        if [ -n "$latest" ]; then
          newest="$(printf '%s\n' "${!by_version[@]}" | sort -V | tail -n 1)"
          if [ "$newest" != "$latest" ] && [ "$(printf '%s\n%s\n' "$newest" "$latest" | sort -V | tail -n 1)" = "$latest" ]; then
            echo "::notice::guides rendered with cc-guides $newest; latest is $latest — non-blocking (the fleet re-render refreshes on content changes, not binary releases)."
            {
              echo "### cc-guides freshness"
              echo "Rendered with **$newest**, latest release is **$latest**. Non-blocking."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
        fi
