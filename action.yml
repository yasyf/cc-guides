name: Guides check
description: >
  Verify every cc-guides artifact is fresh. Drift is non-blocking — a stale
  artifact emits a warning and the daily re-render heals it within 24h — while
  a broken setup (missing, dev, or local lock) still fails. The repo must carry
  a tracked .claude/fragments/cc-guides.lock; the action installs exactly the
  lock's cc-guides version (checksum-verified) and runs one check over every
  artifact, so a new cc-guides release can never redden it. Requires the repo
  to be checked out first (actions/checkout).

inputs:
  files:
    description: >
      Optional whitespace-separated list of layout dirs to check. Default: every
      tracked layout.toml dir.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Resolve locked cc-guides version
      id: lock
      shell: bash
      run: |
        set -euo pipefail

        lock=".claude/fragments/cc-guides.lock"
        if ! git ls-files --error-unmatch -- "$lock" >/dev/null 2>&1; then
          echo "::error::no tracked $lock — run 'cc-guides render' with cc-guides >= 0.1.13 to create the lock, then commit it (the fragments, the artifacts, and the lock together)."
          exit 1
        fi

        # The lock pins the render version and every source commit; install exactly
        # that version and check every unit against it. Single awk over the file
        # (exit after the first match) — never a pipe into head, which SIGPIPEs the
        # producer under pipefail.
        version="$(awk -F'"' '/^version = / {print $2; exit}' "$lock")"
        if [ -z "$version" ]; then
          echo "::error file=$lock::lock has no version — run 'cc-guides render' and commit."
          exit 1
        fi
        if [ "$version" = "dev" ]; then
          echo "::error file=$lock::lock records a dev build — re-render with a released cc-guides and commit."
          exit 1
        fi
        if grep -qE '^commit = "local"' "$lock"; then
          echo "::error file=$lock::lock records commit = \"local\" (a dev render off a local source) — re-render against the committed sources and commit."
          exit 1
        fi
        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Install locked cc-guides
      uses: yasyf/cc-guides/install@action-v1
      with:
        version: ${{ steps.lock.outputs.version }}

    - name: Check rendered guides
      shell: bash
      env:
        INPUT_FILES: ${{ inputs.files }}
        LOCK_VERSION: ${{ steps.lock.outputs.version }}
      run: |
        set -euo pipefail

        check_status=0
        if [ -n "${INPUT_FILES// /}" ]; then
          # shellcheck disable=SC2206
          units=($INPUT_FILES)
          cc-guides check --diff "${units[@]}" || check_status=$?
        else
          cc-guides check --diff || check_status=$?
        fi
        latest="$(curl -fsSLI --max-time 5 -o /dev/null -w '%{url_effective}' \
          "https://github.com/yasyf/cc-guides/releases/latest" || true)"
        latest="${latest##*/tag/v}"
        # A failed or redirect-free lookup leaves the full URL in url_effective; only
        # a bare X.Y.Z-style string is usable as a version.
        case "$latest" in ''|*[!0-9.]*) latest="" ;; esac
        if [ "$check_status" -ge 2 ]; then
          echo "::error::cc-guides check could not run — the layouts, lock, and fragments disagree; run a FULL 'cc-guides render' (no path arguments) with an up-to-date cc-guides and commit the fragments, artifacts, and lock together."
          if [ -n "$latest" ] && [ "$LOCK_VERSION" != "$latest" ] && \
            [ "$(printf '%s\n%s\n' "$LOCK_VERSION" "$latest" | sort -V | tail -n 1)" = "$latest" ]; then
            echo "::error::this repo's lock pins cc-guides $LOCK_VERSION but the latest release is $latest — if the failure above mentions an unsupported target or extension, this is version skew (a stale binary's render downgraded the lock): upgrade cc-guides (brew upgrade cc-guides) and re-render fully, or trigger the Guides re-render workflow."
          fi
          exit "$check_status"
        fi
        if [ "$check_status" -eq 1 ]; then
          echo "::warning::stale rendered guides — non-blocking: the daily re-render heals this within 24h (or run the Guides workflow via workflow_dispatch now). If a rendered artifact was hand-edited, port the edit into .claude/fragments/ and run 'cc-guides render' — the re-render will otherwise revert it."
          {
            echo "### Stale rendered guides (non-blocking)"
            echo "The daily re-render heals this within 24h — run the Guides workflow via workflow_dispatch to heal it now. If a rendered artifact was hand-edited, port the edit into \`.claude/fragments/\` and run \`cc-guides render\`; the re-render will otherwise revert it."
          } >> "$GITHUB_STEP_SUMMARY"
        fi
        newest="$LOCK_VERSION"

        # --- non-blocking freshness notice --------------------------------------
        # The daily re-render lands version bumps within a day, so this only flags
        # a repo whose scheduled re-render is broken or disabled.
        if [ -n "$latest" ]; then
          if [ "$newest" != "$latest" ] && [ "$(printf '%s\n%s\n' "$newest" "$latest" | sort -V | tail -n 1)" = "$latest" ]; then
            echo "::notice::guides rendered with cc-guides $newest; latest is $latest — non-blocking (the daily re-render lands this version bump within a day)."
            {
              echo "### cc-guides freshness"
              echo "Rendered with **$newest**, latest release is **$latest**. Non-blocking."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
        fi
