name: Guides check
description: >
  Verify every cc-guides-rendered artifact (*.src.md â†’ *.md, *.src.sh â†’ *.sh) is
  fresh. Installs the exact cc-guides version each artifact's banner records
  (grouped, checksum-verified), so a new cc-guides release can never redden this
  check. Requires the repo to be checked out first (actions/checkout).

inputs:
  files:
    description: >
      Optional whitespace-separated list of source files to check. Default:
      every *.src.md / *.src.sh tracked by git.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Check rendered guides
      shell: bash
      env:
        INPUT_FILES: ${{ inputs.files }}
      run: |
        set -euo pipefail

        # --- enumerate sources -------------------------------------------------
        if [ -n "${INPUT_FILES// /}" ]; then
          # shellcheck disable=SC2206
          sources=($INPUT_FILES)
        else
          mapfile -t sources < <(git ls-files -- '*.src.md' '*.src.sh')
        fi
        if [ "${#sources[@]}" -eq 0 ]; then
          echo "::error::no *.src.md / *.src.sh sources found â€” this repo is not migrated to cc-guides." \
               " Run 'cc-guides init AGENTS.md' (see https://github.com/yasyf/cc-guides) or drop this action."
          exit 1
        fi

        # --- read each artifact's banner version -------------------------------
        # Banner core: cc-guides <version> src=<src-basename> | GENERATED ...
        # anchored within the first two lines of the artifact.
        declare -A by_version=()
        for src in "${sources[@]}"; do
          artifact="${src%.src.*}.${src##*.}"
          if [ ! -f "$artifact" ]; then
            echo "::error file=$src::rendered artifact '$artifact' is missing â€” run 'cc-guides render' and commit both files."
            exit 1
          fi
          version="$(head -n 2 "$artifact" \
            | sed -nE 's/.*cc-guides ([^ ]+) src=[^ ]+ \| GENERATED.*/\1/p' | head -n 1)"
          if [ -z "$version" ]; then
            echo "::error file=$artifact::no cc-guides banner in the first two lines â€” run 'cc-guides render' (or 'cc-guides init' for a legacy file) and commit."
            exit 1
          fi
          if [ "$version" = "dev" ]; then
            echo "::error file=$artifact::banner records a dev build â€” re-render with a released cc-guides and commit."
            exit 1
          fi
          by_version["$version"]+="$src"$'\n'
        done

        # --- install each banner version and check its group -------------------
        os="$(uname -s | tr '[:upper:]' '[:lower:]')"
        arch="$(uname -m)"
        case "$arch" in x86_64|amd64) arch=amd64 ;; arm64|aarch64) arch=arm64 ;; esac
        bindir="$(mktemp -d)"
        failed=0
        for version in "${!by_version[@]}"; do
          tag="v$version"
          asset="cc-guides_${os}_${arch}"
          base="https://github.com/yasyf/cc-guides/releases/download/$tag"
          echo "installing cc-guides $version ($asset)"
          curl -fsSL --retry 3 -o "$bindir/cc-guides-$version" "$base/$asset"
          curl -fsSL --retry 3 -o "$bindir/checksums-$version.txt" "$base/checksums.txt"
          expected="$(awk -v a="$asset" '$2 == a {print $1}' "$bindir/checksums-$version.txt")"
          actual="$(sha256sum "$bindir/cc-guides-$version" | awk '{print $1}')"
          if [ -z "$expected" ] || [ "$actual" != "$expected" ]; then
            echo "::error::checksum mismatch for $asset at $tag (expected '${expected:-<none>}', got '$actual')"
            exit 1
          fi
          chmod +x "$bindir/cc-guides-$version"
          mapfile -t group <<< "${by_version[$version]%$'\n'}"
          if ! "$bindir/cc-guides-$version" check --diff "${group[@]}"; then
            failed=1
          fi
        done
        if [ "$failed" -ne 0 ]; then
          echo "::error::stale rendered guides â€” run 'cc-guides render' locally and commit source + artifact together."
          exit 1
        fi

        # --- non-blocking freshness notice --------------------------------------
        latest="$(curl -fsSLI -o /dev/null -w '%{url_effective}' \
          "https://github.com/yasyf/cc-guides/releases/latest" || true)"
        latest="${latest##*/tag/v}"
        if [ -n "$latest" ]; then
          newest="$(printf '%s\n' "${!by_version[@]}" | sort -V | tail -n 1)"
          if [ "$newest" != "$latest" ] && [ "$(printf '%s\n%s\n' "$newest" "$latest" | sort -V | tail -n 1)" = "$latest" ]; then
            echo "::notice::guides rendered with cc-guides $newest; latest is $latest â€” the fleet re-render will refresh this repo (or run 'cc-guides render' after 'brew upgrade cc-guides')."
            {
              echo "### cc-guides freshness"
              echo "Rendered with **$newest**, latest release is **$latest**. Non-blocking."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
        fi
